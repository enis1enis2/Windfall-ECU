name: Auto-Fix & Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref_name }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Auto-fix source files
      id: fix
      run: |
        fixed=0

        # --- Trim trailing whitespace in all source files ---
        for pat in "*.py" "*.js" "*.css" "*.html" "*.yml" "*.yaml" "*.md" "*.sh" "*.bat" "*.txt" "*.json"; do
          find . -name "$pat" -not -path './.git/*' -not -path './.venv/*' -not -path './servers/*' -not -path './backups/*' -exec sed -i 's/[[:space:]]*$//' {} +
        done

        # --- Ensure exactly one newline at EOF in all source files ---
        for pat in "*.py" "*.js" "*.css" "*.html" "*.yml" "*.yaml" "*.md" "*.sh" "*.bat" "*.txt" "*.json"; do
          find . -name "$pat" -not -path './.git/*' -not -path './.venv/*' -not -path './servers/*' -not -path './backups/*' | while IFS= read -r f; do
            [ -z "$(tail -c 1 "$f" 2>/dev/null)" ] && continue
            echo >> "$f"
            fixed=$((fixed + 1))
          done
        done

        echo "fixed=$fixed" >> "$GITHUB_OUTPUT"
        echo "Fixed $fixed files (EOF newlines)"

    - name: Check for str(e) in app code
      id: stre_check
      run: |
        FOUND=$(grep -rn --include='*.py' 'str(e)' . | grep -v '.venv/' | grep -v '.git/' || true)
        if [ -n "$FOUND" ]; then
          echo "WARNING: str(e) found in app code:"
          echo "$FOUND"
          echo "result=FAIL" >> "$GITHUB_OUTPUT"
        else
          echo "result=PASS" >> "$GITHUB_OUTPUT"
        fi

    - name: Check all Python files have safe_join available
      run: |
        for f in app.py server_downloader.py zip_importer.py plugin_downloader.py backup_manager.py file_explorer.py; do
          if [ -f "$f" ]; then
            if grep -q 'def.*path\|def.*join\|def.*dir\|def.*file' "$f" 2>/dev/null; then
              if ! grep -q 'from path_util\|import path_util\|safe_join' "$f" 2>/dev/null; then
                echo "MISSING: $f uses path operations but does not import safe_join"
              fi
            fi
          fi
        done

    - name: Check eventlet monkey_patch is first Python import
      run: |
        if [ -f "app.py" ]; then
          FIRST=$(head -5 app.py | grep -c 'eventlet.monkey_patch')
          if [ "$FIRST" -eq 0 ]; then
            echo "ERROR: eventlet.monkey_patch() must be first in app.py"
            exit 1
          fi
          echo "eventlet monkey_patch: OK"
        fi

    - name: Commit auto-fixes
      id: commit
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        if git diff --cached --quiet; then
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          echo "No changes to commit"
        else
          git commit -m "auto: fix trailing whitespace and EOF newlines [skip ci]"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Push fixes
      if: steps.commit.outputs.has_changes == 'true'
      run: git push

  validate:
    needs: auto-fix
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref_name }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check Python syntax (all .py files)
      run: |
        errors=0
        while IFS= read -r f; do
          python -m py_compile "$f" && echo "  OK: $f" || { echo "  FAIL: $f"; errors=$((errors + 1)); }
        done < <(find . -name '*.py' -not -path './.venv/*' -not -path './.git/*' -not -path './servers/*' -not -path './backups/*')
        echo "---"
        if [ "$errors" -gt 0 ]; then echo "Python syntax errors: $errors"; exit 1; fi

    - name: Check app imports
      run: |
        python -c "
        import eventlet; eventlet.monkey_patch()
        from config import HOST, PORT, SECRET_KEY, SERVERS_DIR, BACKUPS_DIR
        from models import init_db, get_servers, get_server, create_server, delete_server, update_server
        from server_manager import ServerProcess, get_server_process, register_server, unregister_server, get_server_path, clean_output
        from terminal_handler import setup_terminal_handlers
        from backup_manager import list_backups, create_backup, restore_backup, delete_backup
        from file_explorer import list_files, read_file, write_file, delete_entry, create_directory, upload_file
        from zip_importer import import_zip
        from docker_manager import check_docker
        from server_downloader import get_types, get_versions, get_builds, download_server
        from plugin_downloader import search_plugins, get_versions as plugin_get_versions, install_plugin, list_installed, delete_plugin
        from auth import login_required, require_permission, register_user, verify_user, init_auth, get_users, get_user_by_id, change_password, change_username, change_role, delete_user, create_user, ROLES
        from auto_backup import start_auto_backup_scheduler
        from update_manager import check_updates, install_updates, schedule_restart
        from path_util import safe_join, safe_path, safe_write, sanitize_name
        print('All imports OK')
        "

    - name: Check JS syntax
      uses: actions/setup-node@v4
      with:
        node-version: "22"
    - run: |
        errors=0
        for f in static/js/*.js; do
          node --check "$f" && echo "  OK: $f" || { echo "  FAIL: $f"; errors=$((errors + 1)); }
        done
        if [ "$errors" -gt 0 ]; then echo "JS syntax errors: $errors"; exit 1; fi

    - name: Check HTML validity
      run: |
        pip install html5lib beautifulsoup4
        python -c "
        from bs4 import BeautifulSoup
        import os
        errors = 0
        for f in ['templates/index.html', 'templates/login.html']:
            if not os.path.isfile(f):
                print(f'{f}: MISSING')
                errors += 1
                continue
            with open(f) as fp:
                content = fp.read()
            soup = BeautifulSoup(content, 'html5lib')
            print(f'{f}: parsed OK ({len(soup.find_all())} elements)')

            # Check for unclosed tags
            if '<!--' in content and '-->' not in content:
                print(f'  WARNING: possible unclosed comment')
        if errors:
            exit(1)
        "

    - name: Check CSS validity
      run: |
        errors=0
        for f in static/css/*.css; do
          if [ -f "$f" ]; then
            python -c "
            content = open('$f').read()
            # Check basic CSS structure: matching braces
            opens = content.count('{')
            closes = content.count('}')
            if opens != closes:
                print(f'  WARNING: $f has {opens} opening and {closes} closing braces')
                exit(1)
            print(f'  OK: $f')
            " || errors=$((errors + 1))
          fi
        done
        if [ "$errors" -gt 0 ]; then echo "CSS errors: $errors"; exit 1; fi

    - name: Check requirements resolve
      run: |
        pip install -r requirements.txt --dry-run 2>&1 | head -5
        echo "Requirements resolved OK"

    - name: Check for str(e) in app code
      run: |
        FOUND=$(grep -rn --include='*.py' 'str(e)' . | grep -v '.venv/' | grep -v '.git/' || true)
        if [ -n "$FOUND" ]; then
          echo "FAIL: str(e) found in app code — may leak exception details:"
          echo "$FOUND"
          exit 1
        else
          echo "PASS: No str(e) in app code"
        fi

    - name: Check for path traversal patterns
      run: |
        FAIL=0
        # Check for os.path.join with user input not using safe_join
        for f in app.py server_downloader.py zip_importer.py plugin_downloader.py backup_manager.py file_explorer.py; do
          if [ -f "$f" ]; then
            # Look for os.path.join where one arg is a variable and no safe_join nearby
            while IFS= read -r line; do
              if echo "$line" | grep -q 'os\.path\.join'; then
                linenum=$(echo "$line" | cut -d: -f1)
                code=$(echo "$line" | cut -d: -f2-)
                # Allow os.path.join in safe_path/safe_join themselves
                if echo "$code" | grep -q 'safe_join\|safe_path\|sanitize'; then
                  continue
                fi
                echo "  NOTE: $f:$linenum uses os.path.join — verify safe_join is not needed"
              fi
            done < <(grep -n 'os.path.join' "$f" 2>/dev/null || true)
          fi
        done

    - name: Summary
      run: |
        echo "=========================================="
        echo "  All checks passed"
        echo "=========================================="
