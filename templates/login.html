<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windfall ECU - Login</title>
  <link rel="stylesheet" href="/static/css/style.min.css?v=3">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="logo">
      <h1>Windfall <span>ECU</span></h1>
    </div>
    <p class="subtitle">Minecraft Server Manager</p>

    <div class="error" id="login-error"></div>

    <form id="login-form" onsubmit="return doLogin(event)">
      <div class="form-row">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
    </form>

    <form id="register-form" style="display:none" onsubmit="return doRegister(event)">
      <div class="form-row">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" placeholder="Choose a username" required autocomplete="off" minlength="3">
      </div>
      <div class="form-row">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Choose a password" required autocomplete="new-password" minlength="4">
      </div>
      <button type="submit" class="btn btn-success" id="register-btn">Create Account</button>
    </form>

    <div class="toggle-link">
      <span id="auth-toggle-text">Don't have an account?</span>
      <a id="auth-toggle-link" onclick="toggleAuthMode()">Register</a>
    </div>

    <div class="theme-toggle-wrap">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>

    <div class="login-footer">
      <a href="https://github.com/enis1enis2/GreatPanel" target="_blank" rel="noopener">Windfall ECU</a> &mdash; Open Source
    </div>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme') || 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      document.querySelector('.theme-toggle').textContent = next === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('windfall-ecu-theme', next);
    }

    const savedTheme = localStorage.getItem('windfall-ecu-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.querySelector('.theme-toggle').textContent = savedTheme === 'dark' ? '🌙' : '☀️';

    let isRegister = false;

    function toggleAuthMode() {
      isRegister = !isRegister;
      document.getElementById('login-form').style.display = isRegister ? 'none' : '';
      document.getElementById('register-form').style.display = isRegister ? '' : 'none';
      document.getElementById('auth-toggle-text').textContent = isRegister ? 'Already have an account?' : "Don't have an account?";
      document.getElementById('auth-toggle-link').textContent = isRegister ? 'Sign In' : 'Register';
      document.getElementById('login-error').style.display = 'none';
    }

    function showError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.style.display = '';
    }

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await r.json();
        if (r.ok) {
          window.location.href = '/';
        } else {
          showError(data.error || 'Login failed');
        }
      } catch (e) {
        showError('Connection error');
      }
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }

    async function doRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.textContent = 'Creating...';
      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('reg-username').value.trim(),
            password: document.getElementById('reg-password').value
          })
        });
        const data = await r.json();
        if (r.ok) {
          window.location.href = '/';
        } else {
          showError(data.error || 'Registration failed');
        }
      } catch (e) {
        showError('Connection error');
      }
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  </script>
</body>
</html>
