services:
  greatpanel:
    build: .
    container_name: greatpanel
    ports:
      - "8080:8080"
    volumes:
      - ./servers:/app/servers
      - ./backups:/app/backups
      - ./instances.db:/app/instances.db
    restart: unless-stopped
    environment:
      - GREATPANEL_PORT=8080
      - GREATPANEL_HOST=0.0.0.0
      - GREATPANEL_SECRET=${GREATPANEL_SECRET:-change-me-in-production}
